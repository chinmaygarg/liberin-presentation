<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      .layer-text { fill: #FFFFFF; font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 600; text-anchor: middle; }
      .layer-title { font-size: 18px; }
      .layer-subtitle { font-size: 11px; font-weight: 400; opacity: 0.85; }
      .arrow-down { fill: none; stroke: #64748B; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Layer 1: Enterprise Apps -->
  <g filter="url(#shadow)">
    <rect x="50" y="30" width="300" height="80" rx="12" ry="12" fill="#94A3B8"/>
    <text x="200" y="68" class="layer-text layer-title">Enterprise Apps</text>
    <text x="200" y="88" class="layer-text layer-subtitle">Client Applications</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="110" x2="200" y2="140" class="arrow-down"/>

  <!-- Layer 2: Boliye -->
  <g filter="url(#shadow)">
    <rect x="50" y="148" width="300" height="80" rx="12" ry="12" fill="#1E6FBF"/>
    <text x="200" y="183" class="layer-text layer-title">Boliye</text>
    <text x="200" y="205" class="layer-text layer-subtitle">AI Interaction Layer</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="200" y1="228" x2="200" y2="258" class="arrow-down"/>

  <!-- Layer 3: Septa -->
  <g filter="url(#shadow)">
    <rect x="50" y="266" width="300" height="80" rx="12" ry="12" fill="#145492"/>
    <text x="200" y="301" class="layer-text layer-title">Septa</text>
    <text x="200" y="323" class="layer-text layer-subtitle">AI Intelligence Layer</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="200" y1="346" x2="200" y2="376" class="arrow-down"/>

  <!-- Layer 4: PiiVacy -->
  <g filter="url(#shadow)">
    <rect x="50" y="384" width="300" height="80" rx="12" ry="12" fill="#0D3660"/>
    <text x="200" y="419" class="layer-text layer-title">PiiVacy</text>
    <text x="200" y="441" class="layer-text layer-subtitle">AI Governance Layer</text>
  </g>

  <!-- Side label -->
  <text x="16" y="270" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11" font-weight="600" transform="rotate(-90 16 270)" text-anchor="middle" letter-spacing="2">PLATFORM STACK</text>
</svg>